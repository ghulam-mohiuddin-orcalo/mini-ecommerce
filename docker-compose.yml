services:
  db:
    image: postgres:16-alpine
    container_name: mini_ecommerce_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-shop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shop}
      POSTGRES_DB: ${POSTGRES_DB:-mini_ecommerce}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-shop} -d ${POSTGRES_DB:-mini_ecommerce}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db_data:
